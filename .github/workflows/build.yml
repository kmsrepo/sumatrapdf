name: Build
on:
  push:
  pull_request:
  release:
    types: [created, published]
  repository_dispatch:
    types: [build-pre-rel]
permissions:
  contents: write
jobs:
  build:
    name: Linux MinGW build
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source code
        uses: actions/checkout@v6
        with:
          # needed to calc build number via git log --oneline
          fetch-depth: 0

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install MinGW toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends mingw-w64

      - name: Build
        run: bun cmd/build-with-mingw.ts -release -clean

      - name: Prepare release assets
        run: |
          mkdir -p out/mingw-rel64/release
          cp out/mingw-rel64/SumatraPDF.exe out/mingw-rel64/release/SumatraPDF-mingw-x64.exe
          cp out/mingw-rel64/SumatraPDF-mingw-x64-install.exe out/mingw-rel64/release/SumatraPDF-mingw-x64-install.exe

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: SumatraPDF-mingw-x64
          path: out/mingw-rel64/release/*.exe

      - name: Upload GitHub release assets
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" out/mingw-rel64/release/*.exe --clobber
