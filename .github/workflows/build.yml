name: Build
on:
  workflow_dispatch:
  repository_dispatch:
    types: [build-pre-rel]
jobs:
  build:
    name: Build
    #runs-on: SumatraBuilder
    runs-on: windows-latest
    steps:
      - name: Check out source code
        uses: actions/checkout@v6
        with:
          # needed to calc build number via git log --oneline
          fetch-depth: 0

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Build
        env:
          R2_SECRET: ${{ secrets.R2_SECRET }}
          R2_ACCESS: ${{ secrets.R2_ACCESS }}
          BB_SECRET: ${{ secrets.BB_SECRET }}
          BB_ACCESS: ${{ secrets.BB_ACCESS }}
        run: bun .\cmd\ci-build.ts

      - name: Upload Windows EXE artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sumatrapdf-exe-${{ github.sha }}
          path: |
            out/rel32/*.exe
            out/rel64/*.exe
            out/arm64/*.exe
          if-no-files-found: error
